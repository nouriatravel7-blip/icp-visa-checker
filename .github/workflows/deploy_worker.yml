name: Deploy Cloudflare Worker

on:
  push:
    branches: [claude/hopeful-cannon-7Oxzr]
    paths: [cloudflare-worker/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/hopeful-cannon-7Oxzr

      - name: Install Node.js 22
        shell: pwsh
        run: |
          $version = "22.14.0"
          $url = "https://nodejs.org/dist/v$version/node-v$version-win-x64.zip"
          $zip = "$env:TEMP\node22.zip"
          $dir = "C:\node22"
          if (!(Test-Path "$dir\node.exe")) {
            Write-Host "Downloading Node.js $version..."
            Invoke-WebRequest -Uri $url -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $dir -Force
            Move-Item "$dir\node-v$version-win-x64\*" "$dir\" -Force
          }
          Write-Host "Node version: $(&"$dir\node.exe" --version)"
          echo "C:\node22" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        shell: pwsh
        working-directory: cloudflare-worker
        run: |
          $env:PATH = "C:\node22;" + $env:PATH
          node --version
          npm install

      - name: Deploy Worker
        shell: pwsh
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $env:PATH = "C:\node22;" + $env:PATH
          node --version
          npx wrangler deploy --minify
