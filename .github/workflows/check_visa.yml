name: ICP Visa Status Check

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      max_employees:
        description: 'Max employees to check (0 = all). Use 5 for a dry-run test.'
        required: false
        default: '0'

jobs:
  check-visa:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/hopeful-cannon-7Oxzr

      - name: Install Python dependencies
        run: |
          pip install playwright requests gspread google-auth
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run visa check
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PYTHONUNBUFFERED: '1'
          MAX_TEST_EMPLOYEES: ${{ github.event.inputs.max_employees || '0' }}
        run: python -u scripts/check_visa.py
